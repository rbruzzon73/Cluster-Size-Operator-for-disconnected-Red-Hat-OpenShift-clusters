apiVersion: operators.coreos.com/v1alpha1
kind: ClusterServiceVersion
metadata:
  annotations:
    alm-examples: |-
      [
        {
          "apiVersion": "management.example.com/v1alpha1",
          "kind": "ClusterSizeConfig",
          "metadata": {
            "name": "clustersize-sample"
          },
          "spec": {
            "log_max_rotations": 10,
            "log_max_size_bytes": 50000
          }
        }
      ]
    capabilities: Basic Install
    categories: Monitoring
    certified: "false"
    containerImage: ghcr.io/rbruzzon73/clustersize-bundle:v2.0.76
    createdAt: "2026-07-13T00:00:00Z"
    description: Cluster Size Operator utility to monitor and scale cluster infrastructure
      resources.
    operatorframework.io/suggested-namespace: openshift-size-monitoring
    support: Platform Team
  name: clustersize.v2.0.76
  namespace: openshift-size-monitoring
spec:
  apiservicedefinitions: {}
  customresourcedefinitions:
    owned:
    - displayName: Cluster Size Config
      kind: ClusterSizeConfig
      name: clustersizeconfigs.management.example.com
      version: v1alpha1
  displayName: Cluster Size Operator
  icon:
  - base64data: 
    mediatype: image/svg+xml
  install:
    spec:
      deployments:
      - name: controller-manager
        spec:
          replicas: 1
          selector:
            matchLabels:
              control-plane: controller-manager
          strategy: {}
          template:
            metadata:
              labels:
                control-plane: controller-manager
            spec:
              containers:
              - args:
                - --metrics-bind-address=:8080
                - --leader-elect
                command:
                - /manager
                env:
                - name: WATCH_NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.annotations['olm.targetNamespaces']
                image: ghcr.io/rbruzzon73/clustersize-operator:v2.0.76
                name: manager
                resources:
                  limits:
                    cpu: 200m
                    memory: 256Mi
                  requests:
                    cpu: 100m
                    memory: 128Mi
              serviceAccountName: clustersize-controller-manager
              terminationGracePeriodSeconds: 10
    strategy: deployment
  installModes:
  - supported: true
    type: OwnNamespace
  - supported: true
    type: SingleNamespace
  - supported: false
    type: MultiNamespace
  - supported: false
    type: AllNamespaces
  keywords:
  - clustersize
  - sizing
  - monitoring
  links:
  - name: GitHub
    url: https://github.com/rbruzzon73/clustersize-operator
  maturity: stable
  provider:
    name: Platform Team
  version: 2.0.76
