apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-clusterrole
rules:
- apiGroups:
  - ""
  resources:
  - nodes
  - configmaps # Necessario per leggere la ConfigMap in kube-system
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - config.openshift.io
  resources:
  - clusterversions
  - clusteroperators # Aggiunto per il controllo baremetal operator
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - metal3.io
  resources:
  - baremetalhosts # Aggiunto per il controllo dei nodi fisici baremetal
  verbs:
  - get
  - list
  - watch
