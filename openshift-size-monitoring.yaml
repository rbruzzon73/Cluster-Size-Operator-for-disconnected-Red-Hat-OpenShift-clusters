apiVersion: v1
kind: Namespace
metadata:
  name: openshift-size-monitoring
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: clustersize-operatorgroup
  namespace: openshift-size-monitoring
spec:
  targetNamespaces:
  - openshift-size-monitoring
---
apiVersion: operators.coreos.com/v1alpha1
kind: CatalogSource
metadata:
  name: clustersize-catalog
  namespace: openshift-marketplace
spec:
  displayName: "Custom Sizing Utilities v2.0.112"
  publisher: "Platform Team"
  sourceType: grpc
  image: ghcr.io/rbruzzon73/clustersize-catalog:v2.0.112
  imagePullPolicy: Always
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: clustersize-operator-sub
  namespace: openshift-size-monitoring
spec:
  channel: test-channel
  name: clustersize
  source: clustersize-catalog
  sourceNamespace: openshift-marketplace
  startingCSV: clustersize.v2.0.112  
---
apiVersion: v1
kind: Secret
metadata:
  name: clustersize-secrets
  namespace: openshift-size-monitoring
type: Opaque
stringData:
  HASH_SALT: "MySecretSaltValue"
---
apiVersion: management.example.com/v1alpha1
kind: ClusterSizeConfig
metadata:
  name: production-sizing-metrics
  namespace: openshift-size-monitoring
spec:
  checkInterval: 60s
  isBareMetal: false
  logMaxRotations: 10
  logMaxSizeBytes: 50000
  remoteIp: 192.168.100.254
  remoteUdpPort: 555
  secret: cluster-size-config-secret
  subscriptionServiceLevel: Premium
  suspend: false
